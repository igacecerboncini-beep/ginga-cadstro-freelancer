<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro Freelancer - Ginga</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    .container { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:10px; }
    h2 { color:#ff6a00; text-align:center; }
    h3 { color:#556b2f; }
    label { display:block; margin-top:10px; }
    input, textarea, select { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
    .row { display:flex; gap:10px; }
    .row div { flex:1; }
    button { margin-top:20px; padding:12px; width:100%; background:#556b2f; color:#fff; border:none; border-radius:8px; font-size:16px; }
    .logo { text-align:center; margin-bottom:20px; font-size:28px; font-weight:bold; color:#ff6a00; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">GINGA Rooftop</div>

  <h2>Ficha Cadastral – Freelancer</h2>

  <form id="form">

    <h3>Dados Pessoais</h3>
    <label>Nome Completo</label>
    <input type="text" id="nome">

    <div class="row">
      <div>
        <label>Data de Nascimento</label>
        <input type="date" id="nascimento">
      </div>
      <div>
        <label>CPF</label>
        <input type="text" id="cpf">
      </div>
    </div>

    <div class="row">
      <div>
        <label>RG</label>
        <input type="text" id="rg">
      </div>
      <div>
        <label>Órgão Emissor</label>
        <input type="text" id="orgao">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Estado Civil</label>
        <input type="text" id="estadoCivil">
      </div>
      <div>
        <label>Telefone / WhatsApp</label>
        <input type="text" id="telefone">
      </div>
    </div>

    <label>Email</label>
    <input type="email" id="email">

    <h3>Endereço</h3>
    <label>Rua / Avenida</label>
    <input type="text" id="rua">

    <div class="row">
      <div>
        <label>Número</label>
        <input type="text" id="numero">
      </div>
      <div>
        <label>Complemento</label>
        <input type="text" id="complemento">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Bairro</label>
        <input type="text" id="bairro">
      </div>
      <div>
        <label>CEP</label>
        <input type="text" id="cep">
      </div>
    </div>

    <div class="row">
      <div>
        <label>Cidade</label>
        <input type="text" id="cidade">
      </div>
      <div>
        <label>Estado</label>
        <input type="text" id="estado">
      </div>
    </div>

    <h3>Dados Profissionais</h3>
    <label>Área de Atuação</label>
    <input type="text" id="area">

    <label>Serviços que presta</label>
    <textarea id="servicos"></textarea>

    <label>Possui CNPJ?</label>
    <select id="cnpjPossui">
      <option>Não</option>
      <option>Sim</option>
    </select>

    <label>CNPJ</label>
    <input type="text" id="cnpj">

    <label>Nome da Empresa / MEI</label>
    <input type="text" id="empresa">

    <label>Site / Portfólio</label>
    <input type="text" id="site">

    <h3>Dados Bancários</h3>
    <label>Banco</label>
    <input type="text" id="banco">

    <label>Tipo de Conta</label>
    <select id="tipoConta">
      <option>Corrente</option>
      <option>Poupança</option>
      <option>PIX</option>
    </select>

    <div class="row">
      <div>
        <label>Agência</label>
        <input type="text" id="agencia">
      </div>
      <div>
        <label>Conta</label>
        <input type="text" id="conta">
      </div>
    </div>

    <label>Chave PIX</label>
    <input type="text" id="pix">

    <label>Nome do Titular</label>
    <input type="text" id="titular">

    <h3>Documentos Anexos</h3>
    <input type="file" id="documentos" multiple>

    <h3>Declaração</h3>
    <label>
      <input type="checkbox" id="declaracao"> Declaro que as informações são verdadeiras
    </label>

    <button type="button" onclick="gerarPDF()">Finalizar e Gerar PDF</button>

  </form>
</div>

<script>
async function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setTextColor(255,106,0);
  doc.setFontSize(16);
  doc.text("Ficha Cadastral - Ginga Rooftop", 20, 20);

  doc.setTextColor(0,0,0);
  doc.setFontSize(10);

  let y = 30;

  function add(text){
    doc.text(text, 20, y);
    y += 6;
  }

  add("Nome: " + nome.value);
  add("Nascimento: " + nascimento.value);
  add("CPF: " + cpf.value);
  add("RG: " + rg.value);
  add("Órgão: " + orgao.value);
  add("Estado Civil: " + estadoCivil.value);
  add("Telefone: " + telefone.value);
  add("Email: " + email.value);

  y += 4;
  add("Endereço: " + rua.value + ", " + numero.value);
  add("Bairro: " + bairro.value + " - " + cidade.value);
  add("CEP: " + cep.value + " / " + estado.value);

  y += 4;
  add("Área: " + area.value);
  add("Serviços: " + servicos.value);
  add("CNPJ: " + cnpj.value);
  add("Empresa: " + empresa.value);
  add("Site: " + site.value);

  y += 4;
  add("Banco: " + banco.value);
  add("Agência: " + agencia.value);
  add("Conta: " + conta.value);
  add("PIX: " + pix.value);
  add("Titular: " + titular.value);

  doc.save("cadastro_freelancer.pdf");
}
</script>

</body>
</html>
